name: Feature request
description: Suggest an improvement for Registry
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Registry do?
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety notes
      description: Does this affect registry writes, imports, permissions, hives, or elevation?
