name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Registry.slnx --runtime win-x64

      - name: Build
        run: dotnet build Registry.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests\Registry.Tests\Registry.Tests.csproj --configuration Release --no-build
