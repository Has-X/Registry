name: Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build static site
        shell: bash
        run: |
          mkdir -p public/docs public/docs/images
          cp README.md public/index.md
          cp LICENSE.md SECURITY.md CONTRIBUTING.md SUPPORT.md public/
          cp docs/*.md public/docs/
          cp -r docs/images/* public/docs/images/
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Registry</title>
            <style>
              :root { color-scheme: light dark; font-family: "Segoe UI", system-ui, sans-serif; }
              body { margin: 0; background: Canvas; color: CanvasText; }
              main { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
              img { width: 96px; height: 96px; }
              a { color: LinkText; }
              .card { border: 1px solid color-mix(in srgb, CanvasText 18%, transparent); border-radius: 8px; padding: 18px; margin: 18px 0; }
              code { background: color-mix(in srgb, CanvasText 10%, transparent); border-radius: 4px; padding: 2px 5px; }
            </style>
          </head>
          <body>
            <main>
              <img src="docs/images/registry-logo-preview.png" alt="Registry logo">
              <h1>Registry</h1>
              <p>A modern Windows registry editor and CLI built with WinUI 3, Windows App SDK, and .NET.</p>
              <div class="card">
                <h2>Status</h2>
                <p>Preview builds focus on regedit-style browsing/editing, import/export, live monitoring, Journal restore, and CLI parity.</p>
              </div>
              <div class="card">
                <h2>Links</h2>
                <p><a href="index.md">README</a> · <a href="docs/launch-plan.md">Launch plan</a> · <a href="docs/performance.md">Performance notes</a> · <a href="SECURITY.md">Security</a></p>
              </div>
              <pre><code>dotnet build Registry.slnx<br>dotnet test tests\Registry.Tests\Registry.Tests.csproj --no-build</code></pre>
            </main>
          </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
