<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Registry cube logo</title>
  <desc id="desc">A symmetrical two by two cube base with upper cubes on positions one, two, and four.</desc>
  <defs>
    <linearGradient id="topBright" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#91fbff"/>
      <stop offset="0.48" stop-color="#24d4ff"/>
      <stop offset="1" stop-color="#1272ff"/>
    </linearGradient>
    <linearGradient id="topDeep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#53cfff"/>
      <stop offset="0.55" stop-color="#116dff"/>
      <stop offset="1" stop-color="#0735bf"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11caff"/>
      <stop offset="1" stop-color="#064bd0"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#138fff"/>
      <stop offset="1" stop-color="#001f91"/>
    </linearGradient>
    <filter id="logoShadow" x="-24%" y="-22%" width="148%" height="158%">
      <feDropShadow dx="0" dy="36" stdDeviation="28" flood-color="#001d5a" flood-opacity="0.32"/>
    </filter>
    <symbol id="cube" viewBox="-86 -100 172 200">
      <path d="M0 -96 82 -49 0 -2 -82 -49Z" fill="var(--top, url(#topBright))"/>
      <path d="M-82 -49 0 -2 0 92 -82 45Z" fill="url(#leftFace)"/>
      <path d="M82 -49 0 -2 0 92 82 45Z" fill="url(#rightFace)"/>
      <path d="M0 -96 82 -49 0 -2 -82 -49Z" fill="none" stroke="#c9fbff" stroke-width="7" stroke-linejoin="round"/>
      <path d="M-82 -49 0 -2 0 92 -82 45Z" fill="none" stroke="#5ae9ff" stroke-width="6" stroke-linejoin="round" opacity="0.86"/>
      <path d="M82 -49 0 -2 0 92 82 45Z" fill="none" stroke="#38cfff" stroke-width="6" stroke-linejoin="round" opacity="0.72"/>
      <path d="M-65 -49 0 -12 65 -49" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    </symbol>
  </defs>

  <rect width="1024" height="1024" fill="none"/>
  <ellipse cx="512" cy="756" rx="330" ry="108" fill="#002970" opacity="0.14"/>

  <g filter="url(#logoShadow)">
    <!-- Base layout:
         1 2
         3 4 -->
    <use href="#cube" x="350" y="438" width="172" height="200" style="--top:url(#topDeep)"/>
    <use href="#cube" x="506" y="438" width="172" height="200" style="--top:url(#topBright)"/>
    <use href="#cube" x="272" y="570" width="172" height="200" style="--top:url(#topBright)"/>
    <use href="#cube" x="428" y="570" width="172" height="200" style="--top:url(#topDeep)"/>

    <!-- Upper cubes on 1, 2, and 4. Upper cube over 3 is intentionally missing. -->
    <use href="#cube" x="350" y="266" width="172" height="200" style="--top:url(#topBright)"/>
    <use href="#cube" x="506" y="266" width="172" height="200" style="--top:url(#topDeep)"/>
    <use href="#cube" x="428" y="398" width="172" height="200" style="--top:url(#topBright)"/>
  </g>
</svg>
